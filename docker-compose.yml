# Optional: a local Postgres with pgvector for the pgvector backend.
# Not needed for the default Chroma backend.
#
#   docker compose up -d
#   VECTOR_BACKEND=pgvector agentic-rag ingest docs

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
