name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src tests eval
          ruff format --check src tests eval

      - name: Type-check
        run: |
          source .venv/bin/activate
          mypy

      - name: Test
        run: |
          source .venv/bin/activate
          pytest
